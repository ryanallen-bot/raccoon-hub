<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Raccoons Unblocked</title>
  <script src="https://meet.jit.si/external_api.js"></script>
  <style>
    :root {
      --bg-dark: #1a0f0d;
      --bg-sidebar: #2b1d19;
      --bg-chat: #3d2b27;
      --text: #ede0d4;
      --accent: #795548;
      --border: #4e342e;
      --unread: #ffd54f;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    nav {
      width: 70px;
      background-color: #110908;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 15px;
      gap: 15px;
      border-right: 2px solid var(--border);
      flex-shrink: 0;
    }
    .nav-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-sidebar);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 22px;
      border: 1px solid var(--border);
      position: relative;
    }
    .nav-icon.active {
      border-radius: 12px;
      background: var(--accent);
      color: white;
    }
    .nav-icon.unread::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--unread);
      border-radius: 50%;
      border: 2px solid #110908;
    }
    .sidebar {
      width: 220px;
      background-color: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 15px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      background: #231714;
      color: #ffab91;
    }
    .channel-btn {
      padding: 10px;
      margin: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      color: #bcaaa4;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .channel-btn.active {
      background: var(--accent);
      color: white;
      font-weight: bold;
    }
    .channel-btn.unread {
      color: var(--unread);
      font-weight: bold;
    }
    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      min-width: 0;
    }
    header {
      height: 50px;
      background: var(--bg-sidebar);
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid var(--border);
      font-weight: bold;
    }
    .page {
      display: none;
      flex-grow: 1;
      height: calc(100vh - 50px);
      overflow: hidden;
    }
    .page.active {
      display: flex;
      flex-direction: column;
    }
    .msg-box {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg-row {
      display: flex;
      gap: 12px;
      margin-bottom: 5px;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; }
    }
    .avatar {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      flex-shrink: 0;
      color: white;
    }
    .msg-bubble {
      display: flex;
      flex-direction: column;
      max-width: 100%;
    }
    .msg-user {
      font-size: 13px;
      color: #ffab91;
      font-weight: bold;
    }
    .msg-text {
      font-size: 14px;
      color: #ede0d4;
      word-break: break-word;
    }
    .msg-media {
      max-width: 300px;
      max-height: 300px;
      border-radius: 8px;
      margin-top: 5px;
      border: 1px solid var(--border);
    }
    .input-area {
      padding: 15px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
    }
    .input-box {
      background: #1a0f0d;
      border-radius: 8px;
      padding: 10px 15px;
      display: flex;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--border);
    }
    .input-box input {
      background: transparent;
      border: none;
      color: white;
      flex-grow: 1;
      outline: none;
    }
    .plus-btn {
      cursor: pointer;
      font-size: 20px;
      color: #bcaaa4;
      transition: 0.2s;
    }
    #auth-overlay, #admin-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(26, 15, 13, 0.98);
      z-index: 5000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .auth-box {
      background: var(--bg-sidebar);
      padding: 30px;
      border-radius: 15px;
      width: 280px;
      text-align: center;
      border: 2px solid var(--accent);
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
      padding: 20px;
      overflow-y: auto;
    }
    .game-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
    }
    
    .update-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
    }
    .update-time {
      font-size: 11px;
      color: #bcaaa4;
      margin-bottom: 5px;
    }
    .admin-btn-container {
      padding: 15px;
      display: flex;
      justify-content: flex-end;
    }
    .action-btn {
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .voice-layout {
      display: flex;
      width: 100%;
      height: 100%;
      background: #000;
    }
    #voice-container {
      flex-grow: 1;
      height: 100%;
    }
    .roster-panel {
      width: 180px;
      background: #150b0a;
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 15px 10px;
      box-sizing: border-box;
    }
    .roster-header {
      font-size: 11px;
      font-weight: bold;
      color: #ffab91;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
    }
    .roster-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #ede0d4;
      background: #231714;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #3d2b27;
    }
    .user-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
    }
  </style>
  <link rel="icon" href="data:,">
</head>
<body>

  <div id="auth-overlay">
    <div class="auth-box">
      <h2 style="color: var(--accent)">🦝 Raccoon Chat</h2>
      <input type="text" id="u-name" placeholder="Username" style="width:90%; padding:10px; margin:10px 0; background:#1a0f0d; color:white; border:1px solid var(--border);">
      <input type="password" id="u-pass" placeholder="Password" style="width:90%; padding:10px; margin:10px 0; background:#1a0f0d; color:white; border:1px solid var(--border);">
      <button onclick="auth('login')" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">LOGIN</button>
      <button onclick="auth('reg')" style="width:100%; padding:10px; margin-top:8px; background:#4e342e; color:white; border:none; border-radius:5px; cursor:pointer;">REGISTER</button>
      <p id="auth-err" style="color:#ff5252; font-size:11px; margin-top:10px;"></p>
    </div>
  </div>

  <div id="admin-overlay">
    <div class="auth-box" style="width: 350px;">
      <h3 style="color: #ffab91; margin-top: 0;">📢 Post System Update</h3>
      <textarea id="update-text" placeholder="Type what you want it to say..." style="width:90%; height:100px; padding:10px; background:#1a0f0d; color:white; border:1px solid var(--border); border-radius:5px; resize:none; font-family:inherit; outline:none;"></textarea>
      <input type="password" id="admin-pass" placeholder="Admin Security Password" style="width:90%; padding:10px; margin:15px 0 10px 0; background:#1a0f0d; color:white; border:1px solid var(--border); border-radius:5px;">
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 5px;">
        <button onclick="submitAdminUpdate()" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">POST</button>
        <button onclick="closeAdminModal()" style="padding:10px 20px; background:#4e342e; color:white; border:none; border-radius:5px; cursor:pointer;">CANCEL</button>
      </div>
      <p id="admin-err" style="color:#ff5252; font-size:11px; margin-top:10px;"></p>
    </div>
  </div>

  <nav>
    <div style="font-size:30px; margin-bottom:10px;">🦝</div>
    <div class="nav-icon active" id="nav-g" onclick="switchMain('games')">🎮</div>
    <div class="nav-icon" id="nav-c" onclick="switchMain('chat')">💬</div>
    <div class="nav-icon" id="nav-u" onclick="switchMain('updates')">📢</div>
    <div class="nav-icon" id="nav-a" onclick="switchMain('ai')">🤖</div>
  </nav>

  <aside class="sidebar">
    <div class="sidebar-header" id="side-title">Raccoons</div>
    <div id="side-channels"></div>
  </aside>

  <main>
    <header id="chat-header"># games</header>

    <div id="games-page" class="page active">
      <div class="games-grid">
        <div class="game-card" onclick="loadGame('https://cdn.jsdelivr.net/gh/er-73-xxx-88/volvo@main/cs.xml')">🔫 CS</div>
        <div class="game-card" onclick="loadGame('https://cdn.jsdelivr.net/gh/organ-nizator/ohh@main/sur.xml')">🚗 Survival</div>
        <div class="game-card" onclick="loadGame('https://cdn.jsdelivr.net/gh/docs-g-classroommyflies/yes@main/google.com-7.xml')">🌐 RvB</div>
      </div>
    </div>

    <div id="updates-page" class="page">
      <div class="admin-btn-container">
        <button class="action-btn" onclick="openAdminModal()">➕ Add Update</button>
      </div>
      <div id="updates-box" class="msg-box" style="padding-top: 0;"></div>
    </div>

    <div id="voice-page" class="page">
      <div class="voice-layout">
        <div id="voice-container"></div>
        <div class="roster-panel">
          <div class="roster-header">Connected (👥)</div>
          <div id="roster-list" class="roster-list"></div>
        </div>
      </div>
    </div>

    <div id="chat-page" class="page">
      <div id="msg-box" class="msg-box"></div>
      <div id="ai-box" class="msg-box" style="display:none;"></div>
      <div class="input-area">
        <div class="input-box">
          <label class="plus-btn" id="media-btn-wrapper">➕<input type="file" id="media-in" hidden onchange="uploadMedia()"></label>
          <input type="text" id="chat-in" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
        </div>
      </div>
    </div>
  </main>

  <script>
    let user = null;
    let mainTab = 'games';
    let target = 'all';
    let lastMsgCount = 0;
    let unreadChannels = new Set();
    let jitsiApi = null;

    function switchMain(tab) {
      if ((tab === 'chat' || tab === 'ai') && !user) {
        showAuth();
        return;
      }
      mainTab = tab;
      document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
      document.getElementById('nav-' + tab[0]).classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      
      const msgView = document.getElementById('msg-box');
      const aiView = document.getElementById('ai-box');
      const mediaBtn = document.getElementById('media-btn-wrapper');
      
      if (tab !== 'chat' || target !== 'voice_lounge') {
        closeVoiceConnection();
      }

      if(tab === 'games') {
        document.getElementById('games-page').classList.add('active');
        document.getElementById('side-title').innerText = "Games Menu";
        document.getElementById('side-channels').innerHTML = '<div class="channel-btn active"># unblocked-games</div>';
      } else if(tab === 'updates') {
        document.getElementById('updates-page').classList.add('active');
        document.getElementById('side-title').innerText = "System Logs";
        document.getElementById('side-channels').innerHTML = '<div class="channel-btn active">📢 change-log</div>';
        fetchUpdates();
      } else if(tab === 'ai') {
        document.getElementById('chat-page').classList.add('active');
        target = 'ai_bot';
        msgView.style.display = 'none';
        aiView.style.display = 'flex';
        mediaBtn.style.display = 'none';
        document.getElementById('side-title').innerText = "Raccoon AI";
        document.getElementById('side-channels').innerHTML = '<div class="channel-btn active">🤖 raccoon-ai</div>';
        if(aiView.innerHTML === "") {
          aiView.innerHTML = '<div class="msg-row"><div class="avatar" style="background:#5d4037">AI</div><div class="msg-bubble"><div class="msg-user">AI</div><div class="msg-text">Ask me anything!</div></div></div>';
        }
      } else {
        document.getElementById('chat-page').classList.add('active');
        target = 'all';
        msgView.style.display = 'flex';
        aiView.style.display = 'none';
        mediaBtn.style.display = 'block';
        document.getElementById('side-title').innerText = "Channels";
        renderSidebar();
        unreadChannels.delete('all');
      }
      updateHeader();
      refresh();
    }

    async function renderSidebar() {
      if(mainTab !== 'chat') return;
      const res = await fetch('/api/users');
      const users = await res.json();
      
      const side = document.getElementById('side-channels');
      side.innerHTML = "";
      
      const gClass = "channel-btn " + ((target === 'all' ? 'active' : '') + (unreadChannels.has('all') ? ' unread' : ''));
      const globalBtn = document.createElement("div");
      globalBtn.className = gClass;
      globalBtn.innerText = "💬 global-chat";
      globalBtn.onclick = function() { setTarget("all"); };
      side.appendChild(globalBtn);

      const vClass = "channel-btn " + (target === 'voice_lounge' ? 'active' : '');
      const voiceBtn = document.createElement("div");
      voiceBtn.className = vClass;
      voiceBtn.innerText = "🔊 Voice Lounge";
      voiceBtn.style.color = "#ffd54f";
      voiceBtn.onclick = function() { setTarget("voice_lounge"); };
      side.appendChild(voiceBtn);

      const dmHeader = document.createElement("div");
      dmHeader.style = "padding:15px 10px 5px; font-size:10px; color:#ffab91; font-weight:bold;";
      dmHeader.innerText = "DIRECT MESSAGES";
      side.appendChild(dmHeader);

      users.forEach(u => {
        if(u !== user) {
          const uClass = "channel-btn " + ((target === u ? 'active' : '') + (unreadChannels.has(u) ? ' unread' : ''));
          const dmBtn = document.createElement("div");
          dmBtn.className = uClass;
          dmBtn.innerText = "👤 " + u;
          dmBtn.onclick = function() { setTarget(u); };
          side.appendChild(dmBtn);
        }
      });
    }

    function setTarget(t) {
      target = t;
      unreadChannels.delete(t);
      
      if(t === 'voice_lounge') {
        document.getElementById('chat-page').classList.remove('active');
        document.getElementById('voice-page').classList.add('active');
        initiateVoiceCall();
      } else {
        document.getElementById('voice-page').classList.remove('active');
        document.getElementById('chat-page').classList.add('active');
        closeVoiceConnection();
      }

      renderSidebar();
      updateHeader();
      refresh();
    }

    function initiateVoiceCall() {
      const container = document.getElementById('voice-container');
      container.innerHTML = "";
      const domainRoomName = "RaccoonsHub_GlobalVoiceRoom_SessionKey";
      
      const options = {
        roomName: domainRoomName,
        width: '100%',
        height: '100%',
        parentNode: container,
        userInfo: {
          displayName: user ? user : "Anonymous Raccoon"
        },
        configOverwrite: {
          startWithAudioMuted: false,
          startWithVideoMuted: false,
          prejoinPageEnabled: false
        },
        interfaceConfigOverwrite: {
          TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'desktop', 'fullscreen',
            'fidescent', 'hangup', 'profile', 'chat', 'settings'
          ]
        }
      };
      
      jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);

      jitsiApi.addEventListeners({
        videoConferenceJoined: updateVoiceRoster,
        participantJoined: updateVoiceRoster,
        participantLeft: updateVoiceRoster
      });
    }

    function updateVoiceRoster() {
      if (!jitsiApi) return;
      setTimeout(() => {
        const listContainer = document.getElementById('roster-list');
        listContainer.innerHTML = "";
        
        const list = jitsiApi.getParticipantsInfo() || [];
        
        const localBadge = document.createElement("div");
        localBadge.className = "user-badge";
        localBadge.innerHTML = '<div class="user-dot"></div><div>' + (user ? user : "Me") + '</div>';
        listContainer.appendChild(localBadge);

        list.forEach(p => {
          if (p.displayName) {
            const badge = document.createElement("div");
            badge.className = "user-badge";
            badge.innerHTML = '<div class="user-dot"></div><div>' + p.displayName + '</div>';
            listContainer.appendChild(badge);
          }
        });
      }, 1000);
    }

    function closeVoiceConnection() {
      if (jitsiApi) {
        jitsiApi.dispose();
        jitsiApi = null;
        document.getElementById('voice-container').innerHTML = "";
        document.getElementById('roster-list').innerHTML = "";
      }
    }

    function updateHeader() {
      const h = document.getElementById('chat-header');
      if(mainTab === 'games') h.innerText = "# unblocked-games";
      else if(mainTab === 'updates') h.innerText = "📢 Official System Updates";
      else if(target === 'voice_lounge') h.innerText = "🔊 Voice & Screen-Share Room";
      else if(target === 'ai_bot') h.innerText = "🤖 raccoon-ai";
      else h.innerText = target === 'all' ? "💬 global-chat" : "🔒 @ " + target;
    }

    function showAuth() {
      document.getElementById('auth-overlay').style.display = 'flex';
    }

    async function auth(type) {
      const u = document.getElementById('u-name').value;
      const p = document.getElementById('u-pass').value;
      
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ u, p, type })
      });
      const data = await res.json();

      if(data.success) {
        user = u;
        document.getElementById('auth-overlay').style.display='none';
        switchMain('chat');
      } else {
        document.getElementById('auth-err').innerText = data.msg;
      }
    }

    function openAdminModal() {
      document.getElementById('admin-overlay').style.display = 'flex';
      document.getElementById('admin-err').innerText = '';
    }

    function closeAdminModal() {
      document.getElementById('admin-overlay').style.display = 'none';
      document.getElementById('update-text').value = '';
      document.getElementById('admin-pass').value = '';
    }

    async function submitAdminUpdate() {
      const text = document.getElementById('update-text').value.trim();
      const pass = document.getElementById('admin-pass').value;
      
      if(!text || !pass) {
        document.getElementById('admin-err').innerText = "Fill out all inputs!";
        return;
      }
      
      const res = await fetch('/api/updates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, pass })
      });
      const data = await res.json();

      if(data.success) {
        closeAdminModal();
        fetchUpdates();
      } else {
        document.getElementById('admin-err').innerText = data.msg;
      }
    }

    async function fetchUpdates() {
      const res = await fetch('/api/updates');
      const updates = await res.json();
      const box = document.getElementById('updates-box');
      box.innerHTML = '';
      if(updates.length === 0) {
        box.innerHTML = '<div style="text-align:center;color:#bcaaa4;margin-top:20px;">No announcement logs found.</div>';
        return;
      }
      updates.forEach(up => {
        const card = document.createElement('div');
        card.className = 'update-card';
        card.innerHTML = `
          <div class="update-time">${up.timestamp}</div>
          <div style="color:#ffab91; font-weight:bold; margin-bottom:5px;">🛠️ Developer Announcement:</div>
          <div style="white-space: pre-wrap; line-height: 1.4;">${up.message}</div>
        `;
        box.appendChild(card);
      });
    }

    async function refresh() {
      if(!user || target === 'ai_bot' || mainTab === 'updates' || target === 'voice_lounge') return;
      
      const res = await fetch(`/api/messages?viewer=${encodeURIComponent(user)}`);
      const msgs = await res.json();
      
      const box = document.getElementById('msg-box');
      box.innerHTML = '';
      let newMsgNotify = false;
      
      msgs.forEach((m, idx) => {
        const isGlobal = m.target === 'all';
        const isMyDM = (m.target === user && m.user === target) || (m.user === user && m.target === target);
        
        if (idx >= lastMsgCount && m.user !== user) {
          if (isGlobal && target !== 'all') { unreadChannels.add('all'); newMsgNotify = true; }
          if (!isGlobal && m.target === user && target !== m.user) { unreadChannels.add(m.user); newMsgNotify = true; }
        }
        
        if ((target === 'all' && isGlobal) || (target !== 'all' && isMyDM)) {
          const row = document.createElement('div');
          row.className = 'msg-row';

          const avatar = document.createElement('div');
          avatar.className = 'avatar';
          avatar.style.backgroundColor = m.user === user ? '#795548' : '#5d4037';
          avatar.innerText = m.user[0].toUpperCase();

          const bubble = document.createElement('div');
          bubble.className = 'msg-bubble';

          const username = document.createElement('div');
          username.className = 'msg-user';
          username.innerText = m.user;
          bubble.appendChild(username);

          if (m.type === 'text') {
            const textNode = document.createElement('div');
            textNode.className = 'msg-text';
            textNode.innerText = m.data;
            bubble.appendChild(textNode);
          } else if (m.type === 'img') {
            const imgNode = document.createElement('img');
            imgNode.className = 'msg-media';
            imgNode.src = m.data;
            bubble.appendChild(imgNode);
          } else if (m.type === 'vid') {
            const vidNode = document.createElement('video');
            vidNode.className = 'msg-media';
            vidNode.src = m.data;
            vidNode.controls = true;
            bubble.appendChild(vidNode);
          }

          row.appendChild(avatar);
          row.appendChild(bubble);
          box.appendChild(row);
        }
      });
      
      if (newMsgNotify) {
        renderSidebar();
        if(mainTab !== 'chat') document.getElementById('nav-c').classList.add('unread');
      } else if (mainTab === 'chat' && unreadChannels.size === 0) {
        document.getElementById('nav-c').classList.remove('unread');
      }
      
      if (msgs.length > lastMsgCount) box.scrollTop = box.scrollHeight;
      lastMsgCount = msgs.length;
    }

    async function send() {
      const inp = document.getElementById('chat-in');
      const txt = inp.value.trim();
      if(!txt) return;
      
      if(target === 'ai_bot') {
        const box = document.getElementById('ai-box');
        const row = document.createElement('div');
        row.className = 'msg-row';
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.style.backgroundColor = '#795548';
        avatar.innerText = user[0].toUpperCase();

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        const nameNode = document.createElement('div');
        nameNode.className = 'msg-user';
        nameNode.innerText = user;

        const textNode = document.createElement('div');
        textNode.className = 'msg-text';
        textNode.innerText = txt;

        bubble.appendChild(nameNode);
        bubble.appendChild(textNode);
        row.appendChild(avatar);
        row.appendChild(bubble);
        box.appendChild(row);
        
        box.scrollTop = box.scrollHeight;
        inp.value = '';
        
        const loader = document.createElement('div');
        loader.className = 'msg-row';
        loader.id = 'ai-loading';
        loader.innerHTML = '<div class="avatar" style="background:#5d4037">AI</div><div class="msg-bubble"><div class="msg-user">AI</div><div class="msg-text" style="color:#bcaaa4; font-style:italic;">Thinking...</div></div>';
        box.appendChild(loader);
        box.scrollTop = box.scrollHeight;

        const aiResponse = await fetch(`/api/ai?prompt=${encodeURIComponent(txt)}`);
        const r = await aiResponse.text();
        
        const loadEl = document.getElementById('ai-loading');
        if(loadEl) loadEl.remove();
        
        const aiRow = document.createElement('div');
        aiRow.className = 'msg-row';
        
        const aiAvatar = document.createElement('div');
        aiAvatar.className = 'avatar';
        aiAvatar.style.backgroundColor = '#5d4037';
        aiAvatar.innerText = 'AI';

        const aiBubble = document.createElement('div');
        aiBubble.className = 'msg-bubble';

        const aiName = document.createElement('div');
        aiName.className = 'msg-user';
        aiName.innerText = 'AI';

        const aiText = document.createElement('div');
        aiText.className = 'msg-text';
        aiText.innerText = r;

        aiBubble.appendChild(aiName);
        aiBubble.appendChild(aiText);
        aiRow.appendChild(aiAvatar);
        aiRow.appendChild(aiBubble);
        box.appendChild(aiRow);
        
        box.scrollTop = box.scrollHeight;
        return;
      }
      
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'text', data: txt, user: user, target: target })
      });
      inp.value = '';
      refresh();
    }

    function uploadMedia() {
      const file = document.getElementById('media-in').files[0];
      if (!file) return;
      const reader = new FileReader();
      const type = file.type.startsWith('video') ? 'vid' : 'img';
      reader.onload = async e => {
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: type, data: e.target.result, user: user, target: target })
        });
        refresh();
      };
      reader.readAsDataURL(file);
    }

    async function loadGame(url) {
      const f = await fetch(url);
      const xml = await f.text();
      const newTab = window.open("", "_blank");
      if (newTab) {
        newTab.document.open();
        newTab.document.write(xml);
        newTab.document.close();
      } else {
        alert('Pop-up blocked! Please allow popups for this site to run games.');
      }
    }

    setInterval(() => {
      if(user) {
        refresh();
        if(mainTab === 'chat') renderSidebar();
      }
    }, 4000);

    // Run layout boot loop right on initialization
    switchMain('games');
  </script>
</body>
</html>
